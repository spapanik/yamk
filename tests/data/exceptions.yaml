$globals:
  version: "8.1"

missing_requirement:
  phony: true
  requires:
    - missing_target

failure:
  phony: true
  commands:
    - "false"
    - echo ${.target}

allowed_failure:
  phony: true
  allow_failures: true
  commands:
    - "false"
    - echo ${.target}

allowed_failure_in_command:
  phony: true
  commands:
    - "[allow_failures]false"

duplicate_requirement:
  phony: true
  requires:
    - phony_requirement
    - phony_requirement

phony_requirement:
  phony: true
  commands:
    - echo ${.target}

existence_not_phony:
  existence_check:
    command: sub
  commands:
    - ls

existence_not_exists_only:
  phony: true
  existence_check:
    command: sub
  commands:
    - ls

dir/file_in_dir:
  commands:
    - echo should_not_run
