name: lint
permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHONUTF8: 1

jobs:
  lint-python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false
          python-version: ${{ matrix.python-version }}
      - name: Install cli tools
        run: |
          uv tool install phosphorus
          uv tool install yamk
      - name: Create and activate a virtual environment (${{ matrix.os }})
        shell: bash
        if: ${{ runner.os != 'Windows' }}
        run: |
          uv venv .venv
          echo "VIRTUAL_ENV=.venv" >> $GITHUB_ENV
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
      - name: Create and activate a virtual environment (${{ matrix.os }})
        shell: pwsh
        if: ${{ runner.os == 'Windows' }}
        run: |
          uv venv .venv
          "VIRTUAL_ENV=.venv" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$PWD/.venv/Scripts" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Install dependencies
        env:
          UV_GROUPS: --no-dev --group lint
        run: |
          yam install
      - name: Lint the project
        run: |
          yam -e lint
